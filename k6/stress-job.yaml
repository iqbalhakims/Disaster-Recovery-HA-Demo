apiVersion: v1
kind: ConfigMap
metadata:
  name: k6-stress-script
  namespace: k6
data:
  stress.js: |
    import http from 'k6/http';
    import { check, sleep } from 'k6';
    import { Rate, Trend } from 'k6/metrics';

    const errorRate = new Rate('errors');
    const backendLatency = new Trend('backend_latency', true);
    const frontendLatency = new Trend('frontend_latency', true);

    const FRONTEND_URL = __ENV.FRONTEND_URL || 'https://app.iqbalhakim.ink';
    const BACKEND_URL = __ENV.BACKEND_URL || 'https://api.iqbalhakim.ink';

    export const options = {
      scenarios: {
        stress: {
          executor: 'ramping-vus',
          startVUs: 0,
          stages: [
            { duration: '20s', target: 3500 },  // ramp to 3500
            { duration: '2m', target: 3500 },   // hold at peak
            { duration: '20s', target: 0 },     // ramp down
          ],
          tags: { scenario: 'stress' },
        },
      },
      thresholds: {
        // intentionally loose — we want to observe failure, not abort early
        errors: ['rate<0.5'],
        http_req_failed: ['rate<0.5'],
      },
    };

    export default function () {
      const frontendRes = http.get(FRONTEND_URL, { tags: { service: 'frontend' } });
      frontendLatency.add(frontendRes.timings.duration);
      const frontendOk = check(frontendRes, {
        'frontend status 200': (r) => r.status === 200,
      });
      errorRate.add(!frontendOk);

      sleep(1);

      const backendRes = http.get(`${BACKEND_URL}/health`, { tags: { service: 'backend' } });
      backendLatency.add(backendRes.timings.duration);
      const backendOk = check(backendRes, {
        'backend status 200': (r) => r.status === 200,
      });
      errorRate.add(!backendOk);

      sleep(1);
    }
---
apiVersion: batch/v1
kind: Job
metadata:
  name: k6-stress-test
  namespace: k6
spec:
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: k6
          image: grafana/k6:latest
          args:
            - run
            - --out
            - experimental-prometheus-rw
            - /scripts/stress.js
          env:
            - name: K6_PROMETHEUS_RW_SERVER_URL
              value: http://kube-prometheus-stack-prometheus.monitoring:9090/api/v1/write
            - name: K6_PROMETHEUS_RW_TREND_AS_NATIVE_HISTOGRAM
              value: "false"
            - name: K6_PROMETHEUS_RW_TREND_STATS
              value: "p(50),p(95),p(99)"
          volumeMounts:
            - name: k6-stress-script
              mountPath: /scripts
      volumes:
        - name: k6-stress-script
          configMap:
            name: k6-stress-script
