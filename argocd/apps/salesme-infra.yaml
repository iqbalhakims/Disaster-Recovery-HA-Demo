apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: salesme-infra
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/iqbalhakims/kube-promethues-stack-test
    targetRevision: main
    path: salesme-infra/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: salesme
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
