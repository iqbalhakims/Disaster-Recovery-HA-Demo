apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: registry-coffman
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: registry-coffman
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: '{"auths":{"registry.digitalocean.com":{"auth":"{{ "{{" }} printf "%s:%s" .token .token | b64enc {{ "}}" }}"}}}'
  dataFrom:
    - extract:
        key: coffman/digitalocean-token
