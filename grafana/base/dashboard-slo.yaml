apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-slo
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  slo-dashboard.json: |
    {
      "title": "SLO Dashboard",
      "uid": "slo-dashboard",
      "timezone": "browser",
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Error Rate",
          "type": "stat",
          "gridPos": { "x": 0, "y": 0, "w": 4, "h": 4 },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.01 },
                  { "color": "red", "value": 0.05 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "api:error_rate_5m or vector(0)",
              "legendFormat": "Error Rate"
            }
          ]
        },
        {
          "id": 2,
          "title": "Request Rate",
          "type": "stat",
          "gridPos": { "x": 4, "y": 0, "w": 4, "h": 4 },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "thresholds": {
                "mode": "absolute",
                "steps": [{ "color": "blue", "value": null }]
              }
            }
          },
          "targets": [
            {
              "expr": "api:request_rate_5m",
              "legendFormat": "Request Rate"
            }
          ]
        },
        {
          "id": 3,
          "title": "P95 Latency",
          "type": "stat",
          "gridPos": { "x": 8, "y": 0, "w": 4, "h": 4 },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.5 },
                  { "color": "red", "value": 1 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by (le) (rate(http_request_duration_seconds_bucket[5m])))",
              "legendFormat": "P95 Latency"
            }
          ]
        },
        {
          "id": 4,
          "title": "SLO Status",
          "type": "stat",
          "gridPos": { "x": 12, "y": 0, "w": 4, "h": 4 },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "textMode": "value_and_name"
          },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "options": { "0": { "text": "OK", "color": "green" }, "1": { "text": "BURNING", "color": "red" } }, "type": "value" }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 1 }]
              }
            }
          },
          "targets": [
            {
              "expr": "ALERTS{alertname=\"FastBurnSLO\",alertstate=\"firing\"} or vector(0)",
              "legendFormat": "FastBurn"
            }
          ]
        },
        {
          "id": 5,
          "title": "Error Rate Over Time",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 4, "w": 12, "h": 8 },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "custom": { "lineWidth": 2 },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.01 },
                  { "color": "red", "value": 0.05 }
                ]
              }
            }
          },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "targets": [
            {
              "expr": "api:error_rate_5m",
              "legendFormat": "Error Rate"
            },
            {
              "expr": "vector(0.05)",
              "legendFormat": "FastBurn Threshold (5%)"
            },
            {
              "expr": "vector(0.01)",
              "legendFormat": "SlowBurn Threshold (1%)"
            }
          ]
        },
        {
          "id": 6,
          "title": "P50 / P95 / P99 Latency",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 4, "w": 12, "h": 8 },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "lineWidth": 2 }
            }
          },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum by (le) (rate(http_request_duration_seconds_bucket[5m])))",
              "legendFormat": "P50"
            },
            {
              "expr": "histogram_quantile(0.95, sum by (le) (rate(http_request_duration_seconds_bucket[5m])))",
              "legendFormat": "P95"
            },
            {
              "expr": "histogram_quantile(0.99, sum by (le) (rate(http_request_duration_seconds_bucket[5m])))",
              "legendFormat": "P99"
            },
            {
              "expr": "vector(1)",
              "legendFormat": "SLO Threshold (1s)"
            }
          ]
        },
        {
          "id": 7,
          "title": "Request Rate & Error Rate",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 12, "w": 24, "h": 8 },
          "fieldConfig": {
            "defaults": {
              "custom": { "lineWidth": 2 }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Error Rate" },
                "properties": [{ "id": "unit", "value": "percentunit" }, { "id": "custom.axisPlacement", "value": "right" }]
              },
              {
                "matcher": { "id": "byName", "options": "Request Rate" },
                "properties": [{ "id": "unit", "value": "reqps" }]
              }
            ]
          },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "targets": [
            {
              "expr": "api:request_rate_5m",
              "legendFormat": "Request Rate"
            },
            {
              "expr": "api:error_rate_5m",
              "legendFormat": "Error Rate"
            }
          ]
        },
        {
          "id": 8,
          "title": "Cluster Health",
          "type": "row",
          "gridPos": { "x": 0, "y": 20, "w": 24, "h": 1 },
          "collapsed": false
        },
        {
          "id": 9,
          "title": "Node Ready Status",
          "type": "stat",
          "gridPos": { "x": 0, "y": 21, "w": 6, "h": 4 },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "textMode": "value_and_name"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "sum(kube_node_status_condition{condition=\"Ready\",status=\"true\"})",
              "legendFormat": "Ready"
            },
            {
              "expr": "sum(kube_node_status_condition{condition=\"Ready\",status=\"false\"})",
              "legendFormat": "Not Ready"
            }
          ]
        },
        {
          "id": 10,
          "title": "Pod Restart Count",
          "type": "timeseries",
          "gridPos": { "x": 6, "y": 21, "w": 18, "h": 8 },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "lineWidth": 2 },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 5 },
                  { "color": "red", "value": 10 }
                ]
              }
            }
          },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "targets": [
            {
              "expr": "sum by (namespace, pod) (increase(kube_pod_container_status_restarts_total[1h]))",
              "legendFormat": "{{namespace}}/{{pod}}"
            }
          ]
        },
        {
          "id": 11,
          "title": "App Health",
          "type": "row",
          "gridPos": { "x": 0, "y": 29, "w": 24, "h": 1 },
          "collapsed": false
        },
        {
          "id": 12,
          "title": "5xx Error Rate",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 30, "w": 24, "h": 8 },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "custom": { "lineWidth": 2 },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.01 },
                  { "color": "red", "value": 0.05 }
                ]
              }
            }
          },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "targets": [
            {
              "expr": "sum by (namespace, destination_workload) (rate(istio_requests_total{response_code=~\"5..\"}[5m])) / sum by (namespace, destination_workload) (rate(istio_requests_total[5m]))",
              "legendFormat": "{{namespace}}/{{destination_workload}}"
            }
          ]
        }
      ],
      "schemaVersion": 39,
      "version": 1
    }
