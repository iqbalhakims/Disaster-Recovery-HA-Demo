apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: telegram-secret
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: telegram-secret
    creationPolicy: Owner
  data:
    - secretKey: bot-token
      remoteRef:
        key: monitoring/telegram
        property: bot-token
